# fly.toml — Fly.io deployment config for the Siddha Galaxia Phase 2 portal.
# `app` is unique on Fly; pick something only you'll use. Mumbai region for
# low latency to Kolkata.

app = "siddha-galaxia-phase2"
primary_region = "bom"

[build]
  dockerfile = "Dockerfile"

# Env vars baked into the deploy. SECRET_KEY is the one thing still set via
# `fly secrets set` since it's a portal-wide cryptographic key.
#
# WARNING: this file is committed to GitHub. Treat the SMTP_PASSWORD below as
# a public credential — keep the repo PRIVATE. If the repo is ever made public
# or leaked, immediately revoke the app password at:
#   https://myaccount.google.com/apppasswords
# and generate a new one.
[env]
  DATABASE_URL    = "sqlite:////data/society.db"
  UPLOAD_FOLDER   = "/data/storage"
  BACKUP_FOLDER   = "/data/backup"
  DEBUG           = "False"
  FRONTEND_DIR    = "/app/frontend/dist"
  COMMITTEE_UPI_ID   = "siddhagalaxiaii@sbi"
  COMMITTEE_UPI_NAME = "Siddha Galaxia Phase 2 Welfare Committee"
  ALGORITHM                   = "HS256"
  ACCESS_TOKEN_EXPIRE_MINUTES = "10080"  # 7 days for resident sessions

  # SMTP — Gmail app password
  SMTP_HOST     = "smtp.gmail.com"
  SMTP_PORT     = "587"
  SMTP_TLS      = "True"
  SMTP_USER     = "siddhagalaxiaphase2.wcportal@gmail.com"
  SMTP_PASSWORD = "pwxbehbsnbxwcjic"
  SMTP_FROM     = "Siddha Galaxia Phase II Welfare Committee <siddhagalaxiaphase2.wcportal@gmail.com>"

# Persistent volume — SQLite DB + storage/qrcodes + receipts + emails live here.
# Survives every deploy/restart. Create once with:
#   fly volumes create sgp2_data --size 5 --region bom
[[mounts]]
  source      = "sgp2_data"
  destination = "/data"

[http_service]
  internal_port       = 8080
  force_https         = true
  auto_stop_machines  = "off"   # keep the machine running 24/7
  auto_start_machines = false
  min_machines_running = 1
  processes = ["app"]

  [http_service.concurrency]
    type        = "requests"
    soft_limit  = 200
    hard_limit  = 250

# 1 GB RAM is plenty for 600 residents + occasional event-day spikes.
# Bump memory_mb to 2048 if you hit OOM on event days (~$11/mo total).
[[vm]]
  cpu_kind  = "shared"
  cpus      = 1
  memory_mb = 1024
